services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: pwhl_fantasy
      POSTGRES_USER: pwhl
      POSTGRES_PASSWORD: pwhlpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pwhl_fantasy.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://pwhl:pwhlpass@db:5432/pwhl_fantasy
      SECRET_KEY: changeme32charslongrandomstring1
    restart: unless-stopped
volumes:
  pgdata:
