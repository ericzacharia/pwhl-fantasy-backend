services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: pwhl_fantasy
      POSTGRES_USER: pwhl
      POSTGRES_PASSWORD: pwhlpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pwhl_fantasy.sql:/docker-entrypoint-initdb.d/seed.sql
    restart: unless-stopped
  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file: .env
    restart: unless-stopped
volumes:
  pgdata:
